<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#b70116" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kampüs Hub" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Kampüs Hub</title>
    <meta name="description" content="Kampüs Hub — Görevler, günlük raporlar ve müşteri süreçleri tek ekranda." />
    <meta name="keywords" content="Kampüs Hub, kampüs yönetim, crm, görevler, raporlar" />
    <meta property="og:title" content="Kampüs Hub" />
    <meta property="og:description" content="Görevler, günlük raporlar ve müşteri süreçleri tek ekranda." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        let swRegistration = null;

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            swRegistration = reg;
            reg.update();

            // ── Yeni SW bulunduğunda güncelleme hazır bayrağı ─────────────
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Yeni versiyon var! Uygulamayı bilgilendir
                  window.dispatchEvent(new CustomEvent('sw-update-available', {
                    detail: { registration: reg }
                  }));
                }
              });
            });
          }).catch((err) => {
            console.error('ServiceWorker registration failed: ', err);
          });
        });

        // ── İOS PWA için kritik: Sekme görünür olduğunda güncelleme kontrol et ─
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden && swRegistration) {
            swRegistration.update();
          }
        });

        // ── Yeni SW kontrolü ele geçirdiğinde sayfayı yenile ─────────────────
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
